{% extends "base_premium.html" %}
{% block title %}Report Detail | Physio AI{% endblock %}
{% block content %}
<section class="glass-card rounded-[30px] p-6" data-reveal>
    <div class="eyebrow"><span class="eyebrow-dot"></span> Report Detail</div>
    <h1 class="mt-5 text-4xl font-semibold tracking-[-0.05em] text-white">{{ report.title }}</h1>
    <p class="mt-3 text-sm text-slate-300">{{ report.report_type }} · {{ report.start_date }} to {{ report.end_date }}</p>
    <div class="mt-6 rounded-[22px] border border-white/10 bg-white/5 p-5">
        <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Summary</p>
        <p class="mt-3 text-sm leading-7 text-slate-300">{{ report.summary }}</p>
    </div>
    <div class="mt-6 rounded-[22px] border border-white/10 bg-white/5 p-5">
        <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Metrics</p>
        <pre class="mt-3 overflow-x-auto whitespace-pre-wrap text-sm leading-7 text-slate-300">{{ report.metrics }}</pre>
    </div>
</section>
{% endblock %}
